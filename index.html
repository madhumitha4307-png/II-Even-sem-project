<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Threat Detection Command Center</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .navbar { background-color: #1e293b; border-bottom: 2px solid #38bdf8; }
        .card { background-color: #1e293b; border: none; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.5); }
        .table { color: #cbd5e1; }
        .badge-critical { background-color: #ef4444; color: white; }
        .status-pulse { height: 10px; width: 10px; background-color: #22c55e; border-radius: 50%; display: inline-block; margin-right: 8px; box-shadow: 0 0 8px #22c55e; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark px-4 py-3">
    <span class="navbar-brand mb-0 h1">🛡️ SENTINEL <span class="text-info">v1.0</span></span>
    <span class="badge bg-dark"><div class="status-pulse"></div> SYSTEM LIVE</span>
</nav>

<div class="container mt-5">
    <div class="row">
        <div class="col-md-12">
            <div class="card p-4">
                <h3 class="mb-4">Security Alert Logs</h3>
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead class="table-dark">
                            <tr>
                                <th>Timestamp</th>
                                <th>Threat Description</th>
                                <th>Severity</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for alert in alerts %}
                            <tr>
                                <td>{{ alert.time }}</td>
                                <td>{{ alert.threat }}</td>
                                <td><span class="badge badge-critical">Critical</span></td>
                            </tr>
                            {% endfor %}
                            {% if not alerts %}
                            <tr>
                                <td colspan="3" class="text-center py-4">No threats detected. System secure.</td>
                            </tr>
                            {% endif %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Refresh page every 10 seconds to show new alerts
    setTimeout(() => { location.reload(); }, 10000);
</script>
</body>
</html>
